name: Test Failure

on:
  workflow_dispatch:

jobs:
  intentional-fail:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run with missing secret
        run: python main.py
        env:
          TELEGRAM_BOT_TOKEN: "invalid_token_12345"
          TELEGRAM_CHAT_ID: "@FakeChannel"
