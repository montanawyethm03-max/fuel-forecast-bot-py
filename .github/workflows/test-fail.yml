name: Test Failure

on:
  workflow_dispatch:

jobs:
  intentional-fail:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install missing package
        run: pip install nonexistent-package-xyz-123

      - name: Run script
        run: python main.py
